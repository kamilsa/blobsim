# blobsim.toml — configuration for `uv run shadow-sim.py`.
#
# Describes a single Shadow simulation: how many nodes of each role, how they are
# wired over CL (QUIC) and EL (TCP), and a geo-realistic network (per-host region,
# supernode class + bandwidth, inter-region latency matrix + jitter). Edit this file;
# the launcher takes only operational flags (config path, --dry-run, --rebuild, --clean).

[run]
# "docker" builds an image (blob-sim on top of [docker].shadow_image) and runs Shadow
#          in a container — zero local setup beyond Docker.
# "native" builds blob-sim with `cargo build --release` and runs a `shadow` binary
#          found on PATH — requires Shadow installed locally (Linux).
runner = "docker"

[sim]
slots = 10                   # number of 12-second slots to simulate
seed = 42                    # master RNG seed (topology + per-node keypairs)
runs = 1                     # number of runs to execute back-to-back; run i uses seed+i,
                             # each rendered as a separate run in the --serve observatory
blobs_per_slot = 6           # blobs each blob-spammer originates per slot (spam rate)
exec_payload_size_kib = 1024 # size of the execution-payload (Execution Envelope) body a builder reveals per slot
max_blobs_per_block = 10     # per-block blob budget; with blocks_in_blobs the payload-blobs
                             # share it (each carries ~124 KiB of payload), so it must be
                             # >= ceil(exec_payload_size_kib / 124). Default 6 if omitted.
enable_partial_columns = true   # gossipsub 1.3 partial messages / data-column sidecars
disable_get_blobs = false        # only meaningful with enable_partial_columns
blocks_in_blobs = true          # EIP-8142: also encode the exec payload into payload-blobs
                                 # seeded onto the column subnets (implies enable_partial_columns)
enable_blob_reconstruction = true # non-builder supernodes reconstruct after the configured trigger
blob_reconstruction_delay_ms = 100
blob_reconstruction_trigger = "per-row" # or "complete-columns"
rust_log = "info"            # per-node RUST_LOG; set "debug" for per-second metrics
# stop_time = "130s"         # optional; default = slots*12s + 10s margin

[topology]
validators = 1024             # non-builder CL nodes (choose sampler/provider per blob)
zk_attesters = 1024             # of the validators, how many are zk-attesters (EIP-8142):
                             # they skip the payload-envelope topic and get payload data
                             # only over the column subnets. Meaningful with blocks_in_blobs.
blob_spammers = 0            # EL-only load generators that originate blobs
peers_per_node = 50           # random CL (QUIC) peers each CL node dials (incl. proposer)
el_peers_per_node = 50        # random EL (TCP) peers each node dials (incl. >=1 spammer)

# Geo-realistic network. A seeded fraction of CL hosts are supernodes, which custody
# all 128 data columns. Other CL hosts keep the default 8-column custody set. EL-only
# blob spammers are always non-supernodes. Inter-host latency comes from a fixed
# inter-region matrix + per-edge jitter.
[network]
jitter_ratio = 0.3           # +/- fraction applied per edge to the base geo latency
packet_loss = 0.0            # per-link packet loss (0.0 - 1.0)
supernode_fraction = 0.05    # fraction of CL hosts assigned as supernodes (0.0 - 1.0)
supernode_bandwidth = "1 Gbit"
non_supernode_bandwidth = "50 Mbit"

[network.regions]            # region -> weight (probability a host lands there)
us-east = 0.30
us-west = 0.15
europe  = 0.25
asia    = 0.20
sa      = 0.05
africa  = 0.05

[docker]
# Base image that ships Shadow (arm64). Must be a build with the tcp_sendUserData
# 65535-byte send cap removed (patched shadow-arm fork, commit ae04b0890) —
# blob-sim's 128 KiB EL frames deadlock on stock Shadow. The :tcpfix tag on Docker
# Hub carries that fix (pulled automatically); to build it yourself:
#   docker build -t kamilsa/shadow-arm:tcpfix ~/dev/shadow
shadow_image = "kamilsa/shadow-arm:tcpfix"
image_name = "blobsim-shadow:local"   # image built from docker/Dockerfile
rebuild = false                       # force `docker build` before running

[output]
dir = "shadow-output"        # where shadow.yaml, topology.gml and shadow.data/ go
