<!DOCTYPE html>
<html>
<head>
    <title>Blob-Sim Network Visualization</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
            color: white; display: flex; align-items: center; gap: 20px; z-index: 10;
        }
        #slider { flex-grow: 1; cursor: pointer; }
        #play-btn { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; min-width: 80px; }
        #play-btn:hover { background: #666; }
        #time-display { min-width: 100px; text-align: right; font-family: monospace; font-size: 1.2em; }
        #legend {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 8px; color: white; font-size: 0.9em; z-index: 10;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        .line { width: 20px; height: 3px; margin-right: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 1.1em; border-bottom: 1px solid #444; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div id="legend">
        <h3>Nodes</h3>
        <div class="legend-item"><div class="dot" style="background: rgb(147, 112, 219)"></div>Builder</div>
        <div class="legend-item"><div class="dot" style="background: rgb(255, 69, 0)"></div>Proposer</div>
        <div class="legend-item"><div class="dot" style="background: rgb(255, 215, 0)"></div>PTC Member</div>
        <div class="legend-item"><div class="dot" style="background: rgb(30, 144, 255)"></div>Sampler</div>
        <div class="legend-item"><div class="dot" style="background: rgb(0, 191, 255)"></div>Provider</div>
        
        <h3 style="margin-top: 15px;">Traffic</h3>
        <div class="legend-item"><div class="line" style="background: rgb(0, 255, 255)"></div>PTC Attestation</div>
        <div class="legend-item"><div class="line" style="background: rgb(255, 0, 255)"></div>Payload Envelope</div>
        <div class="legend-item"><div class="line" style="background: rgb(0, 255, 0)"></div>Blob Sidecar</div>
    </div>

    <div id="ui">
        <button id="play-btn">Pause</button>
        <input type="range" id="slider" min="0" max="12000" value="0">
        <div id="time-display">0 ms</div>
    </div>

    <div id="container"></div>

    <script src="app.js"></script>
</body>
</html>
